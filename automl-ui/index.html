<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Use relative path for favicon to work with Domino proxy -->
    <link rel="icon" type="image/svg+xml" href="./domino-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoML Studio - Domino Data Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Runtime config - MUST load before app, generated by app.sh at startup -->
    <script src="./config.js"></script>
  </head>
  <body class="bg-domino-bg-secondary text-domino-text-primary">
    <div id="root"></div>

    <!-- Early error detection - runs before modules load -->
    <script>
      (function() {
        console.log('[AutoML] Inline script executing, URL:', window.location.href);

        var root = document.getElementById('root');
        root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui"><div style="text-align:center"><div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div><p style="margin-top:16px;color:#6b7280">Loading AutoML Studio...</p><p id="load-status" style="margin-top:8px;color:#9ca3af;font-size:12px">Initializing...</p></div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';

        var statusEl = document.getElementById('load-status');
        setTimeout(function() { if (statusEl && !window.__APP_LOADED__) statusEl.textContent = 'Loading modules...'; }, 1000);
        setTimeout(function() { if (statusEl && !window.__APP_LOADED__) statusEl.textContent = 'Waiting for render...'; }, 5000);
        setTimeout(function() { if (statusEl && !window.__APP_LOADED__) statusEl.textContent = 'Taking longer than expected...'; }, 10000);

        window.onerror = function(msg, url, line, col, error) {
          console.error('[AutoML] Global error:', msg, url, line, col, error);
          root.innerHTML = '<div style="padding:20px;font-family:system-ui;max-width:600px;margin:40px auto"><h1 style="color:#dc2626;margin-bottom:16px">Failed to Load Application</h1><p style="margin-bottom:8px"><strong>Error:</strong> ' + msg + '</p><p style="color:#6b7280;font-size:14px">URL: ' + (url || 'unknown') + '</p><button onclick="location.reload()" style="margin-top:16px;padding:8px 16px;background:#3b82f6;color:white;border:none;border-radius:4px;cursor:pointer">Reload</button></div>';
          return true;
        };

        window.__APP_LOAD_TIMEOUT__ = setTimeout(function() {
          if (!window.__APP_LOADED__) {
            console.error('[AutoML] Timeout - app did not render');
            root.innerHTML = '<div style="padding:20px;font-family:system-ui;max-width:600px;margin:40px auto"><h1 style="color:#dc2626;margin-bottom:16px">Application Load Timeout</h1><p style="margin-bottom:16px">The application failed to initialize.</p><p style="color:#6b7280;font-size:14px;margin-bottom:16px">URL: ' + window.location.href + '</p><button onclick="location.reload()" style="padding:8px 16px;background:#3b82f6;color:white;border:none;border-radius:4px;cursor:pointer">Reload</button></div>';
          }
        }, 15000);
      })();
    </script>

    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
