[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    slow: marks tests as slow (AutoGluon training, may take minutes)
    domino: marks tests that require a live Domino environment
    mlflow: marks tests that require MLflow tracking

# Test report output path (visible in Domino Job results)
addopts =
    -v
    --tb=short
    --html=/mnt/results/test_report.html
    --self-contained-html
    -p no:warnings
